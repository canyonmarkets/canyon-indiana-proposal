<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Canyon One-Pager — Dark vs Light</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #0D1017; color: #EDEDEB;
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif; padding: 28px 24px 48px; }
    h1 { font-size: 19px; font-weight: 800; margin: 0 0 4px; letter-spacing: .01em; }
    p.sub { color: #AEB4BD; font-size: 13px; margin: 0 0 22px; }
    .row { display: flex; gap: 26px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
    .col { flex: 1 1 400px; max-width: 580px; }
    .label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .label span { font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: #AEB4BD; font-weight: 700; }
    a.dl { background: #C94B0C; color: #fff; text-decoration: none; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; padding: 7px 13px; border-radius: 6px; transition: background .2s; }
    a.dl:hover { background: #DC5F1A; }
    img { width: 100%; border: 1px solid rgba(120,146,170,.25); border-radius: 8px; display: block;
      box-shadow: 0 16px 48px -14px rgba(0,0,0,.65); }
    .foot { margin-top: 26px; text-align: center; color: #6b7688; font-size: 11px; letter-spacing: .08em; }
  </style>
</head>
<body>
  <h1>Canyon Markets — One-Pager</h1>
  <p class="sub">Dark and light versions, side by side. Click <strong>Download PDF</strong> for the file to attach.</p>
  <div class="row">
    <div class="col">
      <div class="label"><span>Dark</span><a class="dl" href="/Canyon-OnePager-Dark.pdf" download>Download PDF</a></div>
      <img src="/Canyon-OnePager-Dark.png" alt="Canyon one-pager — dark version" />
    </div>
    <div class="col">
      <div class="label"><span>Light</span><a class="dl" href="/Canyon-OnePager-Light.pdf" download>Download PDF</a></div>
      <img src="/Canyon-OnePager-Light.png" alt="Canyon one-pager — light version" />
    </div>
  </div>
  <div class="foot">Canyon Markets · Integrated Site Solutions</div>
</body>
</html>
